name: Build iOS App
on:
  push:
    branches: [ "main" ] # Runs every time you save code to the main branch

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest # This is your "Cloud Mac"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Clones your code onto the Mac

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Build iOS
        # This creates the app file without needing a $99 Apple Developer license yet
        run: flutter build ios --release --no-codesign 

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/*.app # This saves the file so you can download it
